<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bagel — pair up for coffee</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        max-width: 640px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 { margin-bottom: 0.25rem; }
      .tagline { color: #666; margin-top: 0; }
      .row { display: flex; gap: 0.5rem; margin: 1rem 0; }
      button {
        padding: 0.5rem 1rem;
        font-size: 0.95rem;
        cursor: pointer;
      }
      #log {
        background: #f4f4f4;
        padding: 1rem;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 12rem;
      }
      .pill {
        display: inline-block;
        padding: 0.1rem 0.5rem;
        border-radius: 999px;
        background: #eef;
        font-size: 0.75rem;
        margin-left: 0.5rem;
      }
      .controls {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
        margin: 1rem 0 0.5rem;
        padding: 0.5rem 0.75rem;
        background: #fafafa;
        border: 1px solid #e4e4e4;
        border-radius: 4px;
        font-size: 0.85rem;
      }
      .controls label { color: #555; }
      .controls code {
        background: #eef;
        padding: 0.05rem 0.35rem;
        border-radius: 3px;
        font-size: 0.8rem;
      }
      .gate {
        margin: 1rem 0;
        padding: 0.75rem 1rem;
        border-radius: 4px;
        font-size: 0.95rem;
      }
      .gate-ok    { background: #e8f7ee; border: 1px solid #b6e0c5; color: #1e6b3a; }
      .gate-block { background: #fdecec; border: 1px solid #f4b9b9; color: #8a1f1f; }
      .gate-busy  { background: #fff8e1; border: 1px solid #f0e2a4; color: #6a5512; }
      .gate code  { background: #fff5; padding: 0.05rem 0.3rem; border-radius: 3px; }
      .spin {
        display: inline-block;
        animation: spin 1.4s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <h1>🥯 Bagel</h1>
    <p class="tagline">
      Pair up with another <code>@dfinity.org</code> human for coffee.
      Gated by Internet Identity's certified attributes.
    </p>
    <div id="iiControls" class="controls" hidden>
      <label for="iiInstance">II instance:</label>
      <select id="iiInstance">
        <option value="prod">production (id.ai)</option>
        <option value="beta">beta (beta.id.ai)</option>
      </select>
      <span>→</span>
      <code id="iiEndpoint"></code>
    </div>
    <p>
      Status: <span id="status">not signed in</span>
      <span id="principal" class="pill" hidden></span>
      <span id="email" class="pill" hidden></span>
    </p>
    <div id="gate" class="gate" hidden></div>
    <div class="row">
      <button id="signIn" disabled>Sign in with II</button>
      <button id="join" hidden>Join round</button>
      <button id="match" hidden>My match</button>
      <button id="reset" hidden>Reset</button>
    </div>
    <pre id="log"></pre>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
