# Build + deploy both demo apps against a local icp-cli replica on every
# PR and on pushes to main. Catches build regressions, mops resolution
# breakage, and Motoko EOP stable-type drift (the deployed wasm has to
# install cleanly on a fresh local canister — same code path as
# mainnet, minus the canister id pinning).
#
# Both demos share the install + replica boilerplate; what differs is
# the deploy entry point — bagel relies on icp-cli's inline build,
# dfinsight wraps it in scripts/deploy.sh which also calls setRpOrigin
# — and the sanity query that confirms the canister is reachable
# post-deploy.
name: Demos

on:
  pull_request:
    paths:
      - "demos/**"
      - "src/**"
      - "mops.toml"
      - "mops.lock"
      - ".github/workflows/demos.yml"
  push:
    branches: [main]
    paths:
      - "demos/**"
      - "src/**"
      - "mops.toml"
      - "mops.lock"
      - ".github/workflows/demos.yml"
  workflow_dispatch:

concurrency:
  group: demos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bagel:
    name: Bagel — build + local deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: demos/bagel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: demos/bagel/frontend/package-lock.json

      - name: Install icp-cli, ic-wasm, mops
        run: npm install --global @icp-sdk/icp-cli @icp-sdk/ic-wasm ic-mops

      - name: Cache mops + moc toolchain
        uses: actions/cache@v4
        with:
          path: |
            demos/bagel/.mops
            ~/.cache/mops
          key: mops-bagel-${{ runner.os }}-${{ hashFiles('demos/bagel/mops.toml') }}

      - name: Resolve mops deps + moc toolchain
        run: mops install

      # `icp network start` looks up the latest network-launcher version
      # via the unauthenticated GitHub API, which hits the 60 req/hr
      # rate limit on shared CI runner IPs. Pre-download the launcher
      # ourselves using the runner's authenticated GITHUB_TOKEN and
      # point icp-cli at it so it skips the API call entirely. See
      # https://github.com/dfinity/examples/blob/master/.github/workflows/pre-download-launcher.sh
      # — this is a copy of that workaround.
      - name: Pre-download network launcher (avoid GitHub API rate limit)
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION=$(gh release view --repo dfinity/icp-cli-network-launcher --json tagName -q .tagName)
          TARBALL="icp-cli-network-launcher-x86_64-linux-${VERSION}"
          LAUNCHER_DIR="${HOME}/.icp-cli-launcher"
          mkdir -p "$LAUNCHER_DIR"
          curl -fsSL \
            "https://github.com/dfinity/icp-cli-network-launcher/releases/download/${VERSION}/${TARBALL}.tar.gz" \
            | tar xz -C "$LAUNCHER_DIR"
          LAUNCHER_PATH="${LAUNCHER_DIR}/${TARBALL}/icp-cli-network-launcher"
          chmod +x "$LAUNCHER_PATH"
          echo "ICP_CLI_NETWORK_LAUNCHER_PATH=${LAUNCHER_PATH}" >> "$GITHUB_ENV"
          echo "Launcher ${VERSION} → ${LAUNCHER_PATH}"

      # `-d` runs the network as a background subprocess and returns
      # once it's bound to the gateway port — no manual readiness poll
      # needed.
      - name: Start local replica
        run: icp network start -d

      # `icp deploy` builds the canister (mops install + mops test +
      # moc compile), uploads the asset wasm, installs both canisters,
      # and runs the frontend's `npm ci && npm run build` per icp.yaml.
      - name: Deploy to local replica
        run: icp deploy -e local -y

      # Public query, no II dependency — cheapest way to confirm the
      # canister is installed and responsive after deploy.
      - name: Sanity query (pool_size)
        run: icp canister call bagel pool_size '()' -e local --query

  dfinsight:
    name: Dfinsight — build + local deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: demos/dfinsight
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: demos/dfinsight/package-lock.json

      - name: Install icp-cli, ic-wasm, mops
        run: npm install --global @icp-sdk/icp-cli @icp-sdk/ic-wasm ic-mops

      - name: Cache mops + moc toolchain
        uses: actions/cache@v4
        with:
          path: |
            demos/dfinsight/src/dfinsight_backend/.mops
            ~/.cache/mops
          key: mops-dfinsight-${{ runner.os }}-${{ hashFiles('demos/dfinsight/src/dfinsight_backend/mops.toml') }}

      - name: Resolve mops deps + moc toolchain
        run: mops install
        working-directory: demos/dfinsight/src/dfinsight_backend

      # Same launcher pre-download as the bagel job — see the comment
      # there for context.
      - name: Pre-download network launcher (avoid GitHub API rate limit)
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION=$(gh release view --repo dfinity/icp-cli-network-launcher --json tagName -q .tagName)
          TARBALL="icp-cli-network-launcher-x86_64-linux-${VERSION}"
          LAUNCHER_DIR="${HOME}/.icp-cli-launcher"
          mkdir -p "$LAUNCHER_DIR"
          curl -fsSL \
            "https://github.com/dfinity/icp-cli-network-launcher/releases/download/${VERSION}/${TARBALL}.tar.gz" \
            | tar xz -C "$LAUNCHER_DIR"
          LAUNCHER_PATH="${LAUNCHER_DIR}/${TARBALL}/icp-cli-network-launcher"
          chmod +x "$LAUNCHER_PATH"
          echo "ICP_CLI_NETWORK_LAUNCHER_PATH=${LAUNCHER_PATH}" >> "$GITHUB_ENV"
          echo "Launcher ${VERSION} → ${LAUNCHER_PATH}"

      - name: Start local replica
        run: icp network start -d

      # scripts/deploy.sh -e local mints fresh canister ids on the
      # local replica, bakes the backend id into the frontend bundle,
      # runs `icp deploy`, and calls `setRpOrigin` — same chain as
      # mainnet, just with `http://<frontend>.localhost:4943` as the
      # origin instead of `https://<frontend>.icp0.io`.
      - name: Deploy to local replica
        run: scripts/deploy.sh -e local

      # Public query returning the bootstrap admin list seeded from
      # init_args — confirms install + init ran cleanly. After
      # deploy.sh's setRpOrigin call, getRpOrigin would also be a
      # valid probe, but listAdmins is simpler to grep for in CI logs.
      - name: Sanity query (listAdmins)
        run: icp canister call dfinsight_backend listAdmins '()' -e local --query
