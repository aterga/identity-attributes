name: publish on Mops

on:
  workflow_dispatch:
  push:
    tags:
      - v*.*.*

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v6
      - uses: dfinity/setup-dfx@main # Currently required for `mops publish`
      - uses: caffeinelabs/setup-mops@v1
        with:
          # `MOPS_IDENTITY_PEM` is scoped to the `release` environment; see Settings → Environments.
          identity-pem: ${{ secrets.MOPS_IDENTITY_PEM }}
      - run: mops install
      - run: mops publish
